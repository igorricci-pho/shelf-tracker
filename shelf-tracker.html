<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelf Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --surface: #f6f1e8;
    --panel: #221c15;
    --wood: #3d2b1f;
    --copper: #b8703f;
    --copper-light: #d99461;
    --cell-border: #c9bda6;
    --slot-filled-text: #f4ead9;
    --highlight: #e8a33d;
    --highlight-glow: rgba(232, 163, 61, 0.55);
    --text-dark: #26201a;
    --text-mute: #6f6455;
    --danger: #a8412f;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--font-body);
    background: var(--surface);
    color: var(--text-dark);
  }

  header {
    background: var(--panel);
    color: var(--slot-filled-text);
    padding: 20px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid var(--copper);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand h1 {
    font-family: var(--font-display);
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    margin: 0;
    font-weight: 700;
  }

  .brand span.tag {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--copper-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--copper);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .search-wrap {
    position: relative;
  }

  #searchInput {
    background: #2c241a;
    border: 1px solid #4a3d2c;
    color: var(--slot-filled-text);
    padding: 9px 12px 9px 32px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    width: 220px;
    outline: none;
  }
  #searchInput:focus { border-color: var(--copper); }
  .search-wrap::before {
    content: "";
    position: absolute;
    left: 10px;
    top: 50%;
    width: 12px;
    height: 12px;
    transform: translateY(-50%);
    border: 2px solid var(--copper-light);
    border-radius: 50%;
    opacity: 0.8;
  }
  .search-wrap::after {
    content: "";
    position: absolute;
    left: 20px;
    top: 63%;
    width: 6px;
    height: 2px;
    background: var(--copper-light);
    transform: rotate(45deg);
  }

  #searchResults {
    position: absolute;
    top: 110%;
    left: 0;
    right: 0;
    background: #221c15;
    border: 1px solid #4a3d2c;
    border-radius: 6px;
    max-height: 240px;
    overflow-y: auto;
    z-index: 20;
    display: none;
  }
  #searchResults.open { display: block; }
  .search-result-item {
    padding: 8px 10px;
    font-size: 0.82rem;
    font-family: var(--font-mono);
    color: var(--slot-filled-text);
    cursor: pointer;
    border-bottom: 1px solid #33291d;
  }
  .search-result-item:hover { background: #33291d; }
  .search-result-item .loc { color: var(--copper-light); font-size: 0.72rem; }
  .search-empty {
    padding: 10px;
    font-size: 0.8rem;
    color: var(--text-mute);
  }

  button {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    cursor: pointer;
    transition: transform 0.08s ease, opacity 0.15s ease;
  }
  button:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--copper);
    color: #1b1712;
  }
  .btn-primary:hover { background: var(--copper-light); }

  .btn-ghost {
    background: transparent;
    color: var(--text-dark);
    border: 1px solid var(--cell-border);
  }
  .btn-ghost:hover { border-color: var(--copper); color: var(--copper); }

  .btn-small {
    padding: 6px 10px;
    font-size: 0.76rem;
  }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .shelf {
    background: linear-gradient(180deg, #e9ddc4 0%, #ddceac 100%);
    border-radius: 12px;
    padding: 18px;
    box-shadow: inset 0 0 0 1px #d3c3a0, 0 8px 24px rgba(61, 43, 31, 0.15);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .cell {
    background: var(--surface);
    border-radius: 8px;
    min-height: 130px;
    padding: 10px;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 2px 6px rgba(61,43,31,0.08);
    transition: box-shadow 0.15s ease, transform 0.1s ease;
    border-top: 3px solid var(--wood);
  }
  .cell:hover { transform: translateY(-2px); }

  .cell .pos-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-mute);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .cell .machine-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
  }

  .cell .machine-chip {
    background: var(--wood);
    color: var(--slot-filled-text);
    border-radius: 4px;
    padding: 4px 7px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cell .more-note {
    font-size: 0.68rem;
    color: var(--text-mute);
    padding-left: 2px;
  }

  .cell.empty .machine-list {
    align-items: center;
    justify-content: center;
    color: var(--copper);
    opacity: 0.55;
  }
  .cell.empty .plus {
    font-size: 1.5rem;
    line-height: 1;
  }

  .cell .count-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--copper);
    color: #1b1712;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
  }

  .cell.highlighted {
    animation: pulse-glow 1.4s ease-out 2;
    box-shadow: 0 0 0 3px var(--highlight);
  }

  @keyframes pulse-glow {
    0% { box-shadow: 0 0 0 3px var(--highlight), 0 0 18px 4px var(--highlight-glow); }
    50% { box-shadow: 0 0 0 3px var(--highlight), 0 0 4px 1px var(--highlight-glow); }
    100% { box-shadow: 0 0 0 3px var(--highlight), 0 0 18px 4px var(--highlight-glow); }
  }

  /* Overlay / modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(27, 23, 18, 0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 10px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .modal h3 {
    font-family: var(--font-display);
    margin: 0 0 4px;
    font-size: 1.15rem;
  }
  .modal .modal-sub {
    font-size: 0.78rem;
    color: var(--text-mute);
    margin-bottom: 16px;
    font-family: var(--font-mono);
  }
  .modal label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    margin-bottom: 5px;
    margin-top: 12px;
  }
  .modal input, .modal textarea {
    width: 100%;
    padding: 9px 10px;
    border-radius: 6px;
    border: 1px solid var(--cell-border);
    font-family: var(--font-body);
    font-size: 0.88rem;
  }
  .modal textarea { resize: vertical; min-height: 44px; }

  .cell-machine-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 10px;
    border: 1px solid var(--cell-border);
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .cell-machine-row .info .num {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.85rem;
  }
  .cell-machine-row .info .model {
    font-size: 0.72rem;
    color: var(--text-mute);
  }
  .cell-machine-row .row-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .add-machine-form {
    border-top: 1px dashed var(--cell-border);
    margin-top: 14px;
    padding-top: 14px;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
  }

  .status-line {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-mute);
    margin-top: 18px;
    text-align: center;
  }

  @media (max-width: 560px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    #searchInput { width: 160px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Reparatur Regal Tracker</h1>
    <span class="tag">coffee machines</span>
  </div>
  <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
    <button id="refreshBtn" class="btn-ghost btn-small" style="color: var(--slot-filled-text); border-color: #4a3d2c; background: #2c241a; height: 38px; display: flex; align-items: center; gap: 6px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.5s ease;"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
      Refresh
    </button>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Find machine no...">
      <div id="searchResults"></div>
    </div>
  </div>
</header>

<main>
  <div class="shelf">
    <div class="grid" id="grid"></div>
  </div>
  <div class="status-line" id="statusLine"></div>
</main>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
(function() {
  const ROWS = 4;
  const COLS = 4;
  let data = { cells: {} }; // key "r-c" -> array of {id, number, model, notes}
  let loaded = false;

  const grid = document.getElementById('grid');
  const overlay = document.getElementById('overlay');
  const modal = document.getElementById('modal');
  const statusLine = document.getElementById('statusLine');
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  const refreshBtn = document.getElementById('refreshBtn');

  const BIN_URL = 'https://extendsclass.com/api/json-storage/bin/fbffdff';

  function uid() {
    return 'm' + Math.random().toString(36).slice(2, 9);
  }

  function cellKey(r, c) { return r + '-' + c; }

  function machinesAt(r, c) {
    return data.cells[cellKey(r, c)] || [];
  }

  async function loadData() {
    try {
      const res = await fetch(BIN_URL);
      if (res.ok) {
        const parsed = await res.json();
        if (parsed && parsed.cells) data = parsed;
      } else {
        const localVal = localStorage.getItem('shelf-data-v2');
        if (localVal) {
          const parsed = JSON.parse(localVal);
          if (parsed && parsed.cells) data = parsed;
        }
      }
    } catch (e) {
      try {
        const localVal = localStorage.getItem('shelf-data-v2');
        if (localVal) {
          const parsed = JSON.parse(localVal);
          if (parsed && parsed.cells) data = parsed;
        }
      } catch (err) {}
    }
    loaded = true;
    render();
  }

  async function saveData() {
    statusLine.textContent = 'Saving...';
    try {
      const res = await fetch(BIN_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('Failed to save to cloud');
      
      try {
        localStorage.setItem('shelf-data-v2', JSON.stringify(data));
      } catch (e) {}

      statusLine.textContent = 'Saved';
      setTimeout(() => { if (statusLine.textContent === 'Saved') statusLine.textContent = ''; }, 1500);
    } catch (e) {
      statusLine.textContent = 'Could not save to cloud — check your connection.';
      try {
        localStorage.setItem('shelf-data-v2', JSON.stringify(data));
        statusLine.textContent = 'Saved locally (offline)';
        setTimeout(() => { if (statusLine.textContent.includes('Saved')) statusLine.textContent = ''; }, 2000);
      } catch (err) {}
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function render() {
    if (!loaded) return;
    let html = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const list = machinesAt(r, c);
        const isEmpty = list.length === 0;
        html += `<div class="cell ${isEmpty ? 'empty' : ''}" data-r="${r}" data-c="${c}">
          <span class="pos-label">Row ${r + 1} · Col ${c + 1}</span>
          ${!isEmpty ? `<span class="count-badge">${list.length}</span>` : ''}
          <div class="machine-list">`;
        if (isEmpty) {
          html += `<span class="plus">+</span>`;
        } else {
          const shown = list.slice(0, 3);
          shown.forEach(m => {
            html += `<div class="machine-chip">${escapeHtml(m.number)}</div>`;
          });
          if (list.length > shown.length) {
            html += `<div class="more-note">+${list.length - shown.length} more</div>`;
          }
        }
        html += `</div></div>`;
      }
    }
    grid.innerHTML = html;
    grid.querySelectorAll('.cell').forEach(el => {
      el.addEventListener('click', () => {
        openCellModal(parseInt(el.dataset.r, 10), parseInt(el.dataset.c, 10));
      });
    });
  }

  function openCellModal(r, c) {
    renderCellModal(r, c);
    overlay.classList.add('open');
  }

  function renderCellModal(r, c) {
    const list = machinesAt(r, c);
    let html = `
      <h3>Row ${r + 1}, Column ${c + 1}</h3>
      <div class="modal-sub">${list.length} machine${list.length === 1 ? '' : 's'} on this shelf spot</div>
    `;
    if (list.length > 0) {
      list.forEach(m => {
        html += `<div class="cell-machine-row" data-id="${m.id}">
          <div class="info">
            <div class="num">${escapeHtml(m.number)}</div>
            ${m.model ? `<div class="model">${escapeHtml(m.model)}</div>` : ''}
          </div>
          <div class="row-actions">
            <button class="btn-ghost btn-small" data-action="edit" data-id="${m.id}">Edit</button>
            <button class="btn-danger btn-small" data-action="remove" data-id="${m.id}">Remove</button>
          </div>
        </div>`;
      });
    }
    html += `
      <div class="add-machine-form" id="addForm">
        <label>Machine number *</label>
        <input type="text" id="mNumber" placeholder="e.g. E61-0412">
        <label>Model / name</label>
        <input type="text" id="mModel" placeholder="e.g. Rocket Appartamento">
        <label>Notes</label>
        <textarea id="mNotes" placeholder="optional"></textarea>
        <div class="modal-actions">
          <button class="btn-ghost" id="mCancel">Close</button>
          <button class="btn-primary" id="mAdd">Add machine</button>
        </div>
      </div>
    `;
    modal.innerHTML = html;

    document.getElementById('mCancel').onclick = () => overlay.classList.remove('open');

    document.getElementById('mAdd').onclick = () => {
      const number = document.getElementById('mNumber').value.trim();
      if (!number) {
        document.getElementById('mNumber').style.borderColor = 'var(--danger)';
        return;
      }
      const model = document.getElementById('mModel').value.trim();
      const notes = document.getElementById('mNotes').value.trim();
      const key = cellKey(r, c);
      if (!data.cells[key]) data.cells[key] = [];
      data.cells[key].push({ id: uid(), number, model, notes });
      renderCellModal(r, c);
      render();
      saveData();
    };

    modal.querySelectorAll('[data-action="remove"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = cellKey(r, c);
        data.cells[key] = (data.cells[key] || []).filter(m => m.id !== btn.dataset.id);
        renderCellModal(r, c);
        render();
        saveData();
      });
    });

    modal.querySelectorAll('[data-action="edit"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = cellKey(r, c);
        const m = (data.cells[key] || []).find(x => x.id === btn.dataset.id);
        if (!m) return;
        openEditMachineForm(r, c, m);
      });
    });
  }

  function openEditMachineForm(r, c, m) {
    const list = machinesAt(r, c);
    let html = `
      <h3>Row ${r + 1}, Column ${c + 1}</h3>
      <div class="modal-sub">Editing machine</div>
      <label>Machine number *</label>
      <input type="text" id="eNumber" value="${escapeHtml(m.number)}">
      <label>Model / name</label>
      <input type="text" id="eModel" value="${escapeHtml(m.model || '')}">
      <label>Notes</label>
      <textarea id="eNotes">${escapeHtml(m.notes || '')}</textarea>
      <div class="modal-actions">
        <button class="btn-ghost" id="eCancel">Back</button>
        <button class="btn-primary" id="eSave">Save changes</button>
      </div>
    `;
    modal.innerHTML = html;
    document.getElementById('eCancel').onclick = () => renderCellModal(r, c);
    document.getElementById('eSave').onclick = () => {
      const number = document.getElementById('eNumber').value.trim();
      if (!number) {
        document.getElementById('eNumber').style.borderColor = 'var(--danger)';
        return;
      }
      m.number = number;
      m.model = document.getElementById('eModel').value.trim();
      m.notes = document.getElementById('eNotes').value.trim();
      renderCellModal(r, c);
      render();
      saveData();
    };
  }

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });

  // Search
  function doSearch(query) {
    query = query.trim().toLowerCase();
    if (!query) {
      searchResults.classList.remove('open');
      searchResults.innerHTML = '';
      return;
    }
    const matches = [];
    Object.keys(data.cells).forEach(key => {
      const [r, c] = key.split('-').map(Number);
      (data.cells[key] || []).forEach(m => {
        if (m.number.toLowerCase().includes(query) || (m.model && m.model.toLowerCase().includes(query))) {
          matches.push({ r, c, m });
        }
      });
    });
    if (matches.length === 0) {
      searchResults.innerHTML = '<div class="search-empty">No machine found</div>';
    } else {
      searchResults.innerHTML = matches.map(match => `
        <div class="search-result-item" data-r="${match.r}" data-c="${match.c}">
          ${escapeHtml(match.m.number)} ${match.m.model ? '— ' + escapeHtml(match.m.model) : ''}
          <div class="loc">Row ${match.r + 1}, Column ${match.c + 1}</div>
        </div>
      `).join('');
      searchResults.querySelectorAll('.search-result-item').forEach(el => {
        el.addEventListener('click', () => {
          highlightCell(parseInt(el.dataset.r, 10), parseInt(el.dataset.c, 10));
          searchResults.classList.remove('open');
          searchInput.value = '';
        });
      });
    }
    searchResults.classList.add('open');
  }

  function highlightCell(r, c) {
    const el = grid.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.remove('highlighted');
    void el.offsetWidth;
    el.classList.add('highlighted');
    setTimeout(() => el.classList.remove('highlighted'), 2900);
  }

  searchInput.addEventListener('input', () => doSearch(searchInput.value));
  searchInput.addEventListener('focus', () => { if (searchInput.value) doSearch(searchInput.value); });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) searchResults.classList.remove('open');
  });

  refreshBtn.addEventListener('click', async () => {
    const svg = refreshBtn.querySelector('svg');
    svg.style.transform = 'rotate(360deg)';
    statusLine.textContent = 'Refreshing...';
    await loadData();
    setTimeout(() => {
      svg.style.transform = 'none';
      if (statusLine.textContent === 'Refreshing...') statusLine.textContent = 'Refreshed';
      setTimeout(() => { if (statusLine.textContent === 'Refreshed') statusLine.textContent = ''; }, 1500);
    }, 500);
  });

  loadData();
})();
</script>

</body>
</html>
